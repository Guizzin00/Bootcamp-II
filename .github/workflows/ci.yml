name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "entrega-intermediaria" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Test with pytest
      run: |
        pytest tests/
